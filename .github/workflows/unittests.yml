name: Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio black flake8
        pip install dbt-postgres
    
    - name: Create test directories
      run: |
        mkdir -p data/raw/telegram_messages data/raw/images logs
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_NAME: test_db
        TELEGRAM_API_ID: 12345
        TELEGRAM_API_HASH: test_hash
        TELEGRAM_PHONE: +1234567890
        TELEGRAM_CHANNELS: test_channel
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Wait for PostgreSQL
      run: |
        for i in {1..10}; do
          if pg_isready -h localhost -U test_user -d test_db; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
    
    - name: Run dbt debug
      run: |
        cd medical_warehouse
        dbt debug || true
    
    - name: Run dbt dependencies
      run: |
        cd medical_warehouse
        if [ -f "packages.yml" ]; then
          dbt deps
        fi
    
    - name: Run dbt models
      run: |
        cd medical_warehouse
        dbt run --models staging marts || true
    
    - name: Run dbt tests
      run: |
        cd medical_warehouse
        dbt test || true
    
    - name: Generate dbt documentation
      run: |
        cd medical_warehouse
        dbt docs generate || true
    
    - name: Upload dbt artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dbt-artifacts
        path: |
          medical_warehouse/target/
          medical_warehouse/logs/
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          coverage.xml
          .coverage
          htmlcov/
          bandit-report.json
          pytest-report.xml
    
    - name: Verify project structure
      run: |
        echo "Checking project structure..."
        [ -f "src/scraper.py" ] && echo "✓ scraper.py exists"
        [ -f "src/data_loader.py" ] && echo "✓ data_loader.py exists"
        [ -d "medical_warehouse/models/staging" ] && echo "✓ staging models exist"
        [ -d "medical_warehouse/models/marts" ] && echo "✓ marts models exist"
        [ -f "medical_warehouse/dbt_project.yml" ] && echo "✓ dbt_project.yml exists"